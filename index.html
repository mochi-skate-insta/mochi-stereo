<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>mochi stereo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Handwritten/script font -->
<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(to bottom, #ffe4f2, #ffffff);
  text-align: center;
}

.hero {
  width: 280px;
  margin-top: 60px;
}

h1 {
  font-family: 'Pacifico', cursive;
  font-size: 48px;
  margin: 20px 0;
}

button {
  background: #ff4fa3;
  color: white;
  border: none;
  padding: 14px 24px;
  border-radius: 30px;
  font-size: 16px;
  cursor: pointer;
  margin: 10px;
}

.player {
  margin-top: 40px;
}

audio {
  margin-top: 10px;
  width: 90%;
  max-width: 400px;
}

.control-btns button {
  background: #ff4fa3;
  margin: 5px;
  border-radius: 20px;
  padding: 10px 20px;
  font-size: 14px;
}

.back-btn {
  background: none;
  color: #ff4fa3;
  font-size: 18px;
  cursor: pointer;
  margin-bottom: 20px;
  border: none;
}

#songTitle {
  margin-top: 10px;
  font-size: 18px;
  font-weight: bold;
}
</style>
</head>
<body>

<div id="app"></div>

<script>
const songs = [
  "https://dcdkwhghtzvwffqtrqjb.supabase.co/storage/v1/object/public/sound/(mmm).mp3",
  "https://dcdkwhghtzvwffqtrqjb.supabase.co/storage/v1/object/public/sound/Ape%20tsukareru.mp3",
  "https://dcdkwhghtzvwffqtrqjb.supabase.co/storage/v1/object/public/sound/Spoon%20Drill%20(1).mp3"
  // Add all 212 links here
];

let currentSong = null;
let audio = null;

function renderHome() {
  if(audio) {
    audio.pause();
    audio.currentTime = 0;
  }

  document.getElementById("app").innerHTML = `
    <img class="hero" src="https://mochi-stereo-sound.lovable.app/assets/hero-headphones-C_7uh22w.png" alt="Pink Headphones"/>
    <h1>mochi stereo</h1>
    <button onclick="playRandom()">Play Random Song</button>
  `;
}

function playRandom() {
  currentSong = songs[Math.floor(Math.random() * songs.length)];

  document.getElementById("app").innerHTML = `
    <button class="back-btn" onclick="goBack()">← Back</button>
    <div class="player">
      <p id="songTitle">Now Playing: ${decodeURIComponent(currentSong.split('/').pop())}</p>
      <audio id="audioPlayer" src="${currentSong}" controls autoplay></audio>
      <div class="control-btns">
        <button onclick="playAudio()">Play</button>
        <button onclick="pauseAudio()">Pause</button>
        <button onclick="stopAudio()">Stop</button>
        <button onclick="playRandom()">Next Random Song</button>
      </div>
    </div>
  `;

  audio = document.getElementById("audioPlayer");
}

function playAudio() { if(audio) audio.play(); }
function pauseAudio() { if(audio) audio.pause(); }
function stopAudio() { if(audio) { audio.pause(); audio.currentTime = 0; } }

function goBack() {
  stopAudio();
  renderHome();
}

// Initial render
renderHome();
</script>

</body>
</html>
