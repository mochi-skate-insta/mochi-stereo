<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>mochi stereo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Handwritten/script font -->
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: linear-gradient(to bottom, #ffe4f2, #ffffff);
      text-align: center;
    }

    .hero {
      width: 280px;
      margin-top: 60px;
    }

    h1 {
      font-family: 'Pacifico', cursive;
      font-size: 48px;
      margin: 20px 0;
    }

    button {
      background: #ff4fa3;
      color: white;
      border: none;
      padding: 14px 24px;
      border-radius: 30px;
      font-size: 16px;
      cursor: pointer;
      margin: 10px;
    }

    .player {
      margin-top: 40px;
    }

    audio {
      margin-top: 10px;
      width: 90%;
      max-width: 400px;
    }

    .control-btns button {
      background: #ff4fa3;
      margin: 5px;
      border-radius: 20px;
      padding: 10px 20px;
      font-size: 14px;
    }

    .back-btn {
      background: none;
      color: #ff4fa3;
      font-size: 18px;
      cursor: pointer;
      margin-bottom: 20px;
      border: none;
    }
  </style>
</head>
<body>

<div id="app"></div>

<script>
  // Your MP3 links (replace with all 212)
  const songs = [
    "https://dcdkwhghtzvwffqtrqjb.supabase.co/storage/v1/object/public/sound/(mmm).mp3",
    "https://dcdkwhghtzvwffqtrqjb.supabase.co/storage/v1/object/public/sound/Ape%20tsukareru.mp3",
    "https://dcdkwhghtzvwffqtrqjb.supabase.co/storage/v1/object/public/sound/Spoon%20Drill%20(1).mp3"
  ];

  let currentSong = null;

  function renderHome() {
    document.getElementById("app").innerHTML = `
      <img class="hero" src="https://images.unsplash.com/photo-1600180758895-2c026b1b3f1b?crop=entropy&cs=tinysrgb&fit=max&h=400&w=400" alt="Pink Headphones"/>
      <h1>mochi stereo</h1>
      <button onclick="playRandom()">Play Random Song</button>
    `;
  }

  function playRandom() {
    // Pick a random song
    currentSong = songs[Math.floor(Math.random() * songs.length)];

    document.getElementById("app").innerHTML = `
      <button class="back-btn" onclick="goBack()">← Back</button>
      <div class="player">
        <p>Now Playing</p>
        <audio id="audioPlayer" src="${currentSong}" autoplay></audio>
        <div class="control-btns">
          <button onclick="playAudio()">Play</button>
          <button onclick="pauseAudio()">Pause</button>
          <button onclick="stopAudio()">Stop</button>
          <button onclick="playRandom()">Next Random Song</button>
        </div>
      </div>
    `;
  }

  function playAudio() {
    const player = document.getElementById("audioPlayer");
    if (player) player.play();
  }

  function pauseAudio() {
    const player = document.getElementById("audioPlayer");
    if (player) player.pause();
  }

  function stopAudio() {
    const player = document.getElementById("audioPlayer");
    if (player) {
      player.pause();
      player.currentTime = 0;
    }
  }

  function goBack() {
    stopAudio();
    renderHome();
  }

  // Initial render
  renderHome();
</script>

</body>
</html>
