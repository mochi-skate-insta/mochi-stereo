<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Pacifico&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top, #1a1a1a, #0d0d0d);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

/* Main container */
#app {
  width: 100%;
  max-width: 420px;
  padding: 20px;
}

/* Glass card */
.card {
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(20px);
  border-radius: 20px;
  padding: 30px 20px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
}

/* Hero image */
.hero {
  width: 180px;
  margin-bottom: 20px;
}

/* Title */
h1 {
  font-family: 'Pacifico', cursive;
  font-size: 42px;
  margin: 10px 0 20px;
}

/* Buttons */
button {
  background: linear-gradient(135deg, #ff4fa3, #ff7ac6);
  color: white;
  border: none;
  padding: 14px;
  border-radius: 14px;
  font-size: 15px;
  cursor: pointer;
  width: 100%;
  margin-top: 10px;
  transition: 0.2s;
}

button:hover {
  transform: translateY(-2px);
  opacity: 0.9;
}

/* Player */
.player {
  margin-top: 10px;
}

/* Song title */
#songTitle {
  font-size: 16px;
  margin-bottom: 10px;
  opacity: 0.8;
}

/* Audio */
audio {
  width: 100%;
  margin: 10px 0;
}

/* Controls grid */
.control-btns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

/* Back button */
.back-btn {
  background: none;
  color: #ff7ac6;
  margin-bottom: 10px;
  font-size: 14px;
}
</style>
