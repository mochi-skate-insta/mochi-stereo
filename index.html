<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>mochi stereo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Pacifico&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top, #1a1a1a, #0d0d0d);
  color: white;
}

/* Container */
#app {
  max-width: 420px;
  margin: 60px auto;
  padding: 20px;
  text-align: center;
}

/* Card */
.card {
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 30px 20px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
}

/* Image */
.hero {
  width: 160px;
  margin-bottom: 20px;
}

/* Title */
h1 {
  font-family: 'Pacifico', cursive;
  font-size: 40px;
  margin-bottom: 20px;
}

/* Buttons */
button {
  background: linear-gradient(135deg, #ff4fa3, #ff7ac6);
  color: white;
  border: none;
  padding: 14px;
  border-radius: 14px;
  font-size: 15px;
  cursor: pointer;
  width: 100%;
  margin-top: 10px;
  transition: 0.2s;
}

button:hover {
  transform: translateY(-2px);
  opacity: 0.9;
}

/* Player */
.player {
  margin-top: 10px;
}

/* Song title */
#songTitle {
  font-size: 15px;
  margin-bottom: 10px;
  opacity: 0.8;
}

/* Audio */
audio {
  width: 100%;
  margin: 10px 0;
}

/* Controls */
.control-btns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

/* Back button */
.back-btn {
  background: none;
  color: #ff7ac6;
  font-size: 14px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div id="app"></div>

<script>
const songs = [
  "https://dcdkwhghtzvwffqtrqjb.supabase.co/storage/v1/object/public/sound/(mmm).mp3",
  "https://dcdkwhghtzvwffqtrqjb.supabase.co/storage/v1/object/public/sound/Ape%20tsukareru.mp3",
  "https://dcdkwhghtzvwffqtrqjb.supabase.co/storage/v1/object/public/sound/Spoon%20Drill%20(1).mp3",
  "https://dcdkwhghtzvwffqtrqjb.supabase.co/storage/v1/object/public/sound/Cada%20Vez%20Que%20Rodamos.mp3"
];

let currentSong = null;
let audio = null;

function renderHome() {
  if (audio) {
    audio.pause();
    audio.currentTime = 0;
  }

  document.getElementById("app").innerHTML = `
    <div class="card">
      <img class="hero" src="https://mochi-stereo-sound.lovable.app/assets/hero-headphones-C_7uh22w.png" alt="headphones"/>
      <h1>mochi stereo</h1>
      <button onclick="playRandom()">Play Random Song</button>
    </div>
  `;
}

function playRandom() {
  currentSong = songs[Math.floor(Math.random() * songs.length)];

  document.getElementById("app").innerHTML = `
    <div class="card">
      <button class="back-btn" onclick="goBack()">← Back</button>

      <div class="player">
        <p id="songTitle">${decodeURIComponent(currentSong.split('/').pop())}</p>

        <audio id="audioPlayer" src="${currentSong}" autoplay></audio>

        <div class="control-btns">
          <button onclick="playAudio()">Play</button>
          <button onclick="pauseAudio()">Pause</button>
          <button onclick="stopAudio()">Stop</button>
          <button onclick="playRandom()">Next</button>
        </div>
      </div>
    </div>
  `;

  audio = document.getElementById("audioPlayer");
}

function playAudio() {
  if (audio) audio.play();
}

function pauseAudio() {
  if (audio) audio.pause();
}

function stopAudio() {
  if (audio) {
    audio.pause();
    audio.currentTime = 0;
  }
}

function goBack() {
  stopAudio();
  renderHome();
}

// Start app
renderHome();
</script>

</body>
</html>
